<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ABCD Pokedéx</title>

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main>
      <div id="pokedex-choose-panel" class="panels">
        <h1 id="main-title">Welcome to the Pokédex</h1>

        <div id="select-pokemon">
          <select id="generation-list">
            <option value="1">Gen 1</option>
            <option value="2">Gen 2</option>
            <option value="3">Gen 3</option>
            <option value="4">Gen 4</option>
            <option value="5">Gen 5</option>
            <option value="6">Gen 6</option>
            <option value="7">Gen 7</option>
            <option value="8">Gen 8</option>
            <option value="9">Gen 9</option>
          </select>

          <button id="select-button">
            Get Pokémon list
          </button>
        </div>

        <div id="search-bar">
          <button id="search-button"><img src="images/search.png" class="small-icons"></button>
          <input type="text" id="search-input" placeholder="Search for a Pokémon by name..." />
        </div>

        <ul id="initial-display">
          Start browsing by getting the list!
        </ul>
        <ol id="pokemon-list"></ol>
      </div>

      <div id="pokedex-display-panel" class="panels">
        <div id="poke-detail">
          <div id="detail-view">
            <p id="detail-placeholder"></p>
          </div>
        </div>
      </div>
    </main>

    <!-- SCRIPT BLOCK -->
    <script type="module" src="./scripts/router.js"></script>
  </body>
</html>
